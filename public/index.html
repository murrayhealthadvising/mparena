<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MParena CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#0f1117;color:#e2e8f0;min-height:100vh}
.topbar{background:#151821;border-bottom:1px solid #1e2535;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;color:#378ADD;letter-spacing:0.5px}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-primary{background:#378ADD;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer}
.btn-primary:hover{background:#185FA5}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #2a3347;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn-ghost:hover{background:#1e2535;color:#e2e8f0}
.stats-bar{background:#151821;border-bottom:1px solid #1e2535;padding:10px 20px;display:flex;gap:12px;flex-wrap:wrap}
.stat{background:#1a2133;border-radius:8px;padding:8px 16px;min-width:80px;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
.filters{background:#151821;border-bottom:1px solid #1e2535;padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:#1a2133;border:1px solid #2a3347;border-radius:8px;color:#e2e8f0;padding:7px 12px;font-size:13px;outline:none}
.filters input{width:220px}
.filters input::placeholder{color:#64748b}
.filters select option{background:#1a2133}
.filters input:focus,.filters select:focus{border-color:#378ADD}
.btn-reset{background:transparent;color:#64748b;border:1px solid #2a3347;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.btn-reset:hover{color:#e2e8f0;border-color:#378ADD}
.count-bar{padding:8px 20px;font-size:12px;color:#64748b;border-bottom:1px solid #1e2535;background:#151821;display:fle{;justify-content:space-between;align-items:center}
.leads-list{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
